services:
  - type: web
    name: sachinova-timecard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn.conf.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: STORE_PW_KIYOSUMI
        sync: false
      - key: STORE_PW_HIKIFUNE
        sync: false
      - key: LINE_MESSAGING_ENABLED
        value: "false"
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_ADMIN_USER_IDS
        sync: false
      - key: BACKUP_ENABLED
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.0"
